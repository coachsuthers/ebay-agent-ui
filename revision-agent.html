<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Revise — Family Selling</title>
  <link rel="stylesheet" href="shared/styles.css" />
  <script src="shared/theme.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .fld{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:15px;padding:10px 12px;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--accent)}
    textarea{min-height:150px;resize:vertical;line-height:1.6}
    .grid{display:grid;gap:14px;grid-template-columns:1fr;margin-bottom:14px}
    @media(min-width:640px){.grid.two{grid-template-columns:1fr 1fr}}
    .rowactions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;padding-top:20px;border-top:1px solid var(--border)}
    .toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border-lit);color:var(--text);padding:12px 18px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;max-width:90vw;text-align:center}
    .toast.show{opacity:1}
    .price{font-family:var(--mono);color:var(--accent)}
    .sku{font-family:var(--mono);font-size:11px;color:var(--muted)}
    .sect{margin-top:26px}
    .sect h3{font-size:15px;font-weight:600;margin:0 0 4px}
    .sect .hint{font-size:12.5px;color:var(--text-dim);margin:0 0 12px;line-height:1.5}
    .aspect{margin-bottom:12px}
    .aspect .req{color:var(--accent);font-weight:700;margin-left:3px}
    .catbox{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
    .catcur{font-size:13.5px;color:var(--text-dim);margin-bottom:10px}
    .catcur b{color:var(--text)}
    .catresult{padding:9px 11px;border:1px solid var(--border);border-radius:8px;margin-top:7px;cursor:pointer;font-size:13px;background:var(--surface)}
    .catresult:hover{border-color:var(--accent);background:var(--bg)}
    .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .thumb{position:relative;width:78px;height:78px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .thumb .del{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;font-size:13px;cursor:pointer;line-height:1;display:grid;place-items:center}
    .listrow{display:flex;align-items:center;gap:12px;padding:13px 12px;border-bottom:1px solid var(--border);cursor:pointer;flex-wrap:wrap}
    .listrow:hover{background:var(--surface-2)}
    .listrow:last-child{border-bottom:none}
    .listrow .lt{flex:1;min-width:150px}
    .listrow .lt b{display:block;font-weight:500;font-size:14.5px;color:var(--text);margin-bottom:2px}
    .listrow img{width:52px;height:52px;object-fit:cover;border-radius:7px;flex-shrink:0;background:var(--surface-2)}
    .badge{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;background:var(--surface-2);color:var(--text-dim)}
    .spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes sp{to{transform:rotate(360deg)}}
    .warnbox{background:color-mix(in srgb,var(--warn) 12%,transparent);border:1px solid color-mix(in srgb,var(--warn) 35%,transparent);color:var(--warn);padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;line-height:1.5}
  </style>
</head>
<body>
  <div id="app" class="wrap hidden">
    <header class="topbar">
      <div class="brand"><img class="brand-mark" src="shared/family-mark.png" alt="Family Selling"><span class="mark">Family <b>Selling</b></span><span class="sub">Revise</span></div>
      <div id="userchip"></div>
    </header>

    <a class="back" href="index.html">← Home</a>
    <p class="eyebrow">02 · Manage</p>
    <h1 class="page" id="pageTitle">Live listings</h1>
    <p class="lede" id="pageLede">Items listed through this tool. Because they were created via the Inventory API they can't be edited in Seller Hub — revise them here.</p>

    <!-- LIST -->
    <div id="listView" class="panel" style="padding:4px 8px">
      <div class="empty"><div class="big">Loading…</div><div>Fetching your live eBay listings.</div></div>
    </div>

    <!-- EDIT -->
    <div id="editView" class="panel hidden">
      <a class="back" href="#" id="backToList">← All listings</a>
      <div id="editBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="shared/config.js"></script>
  <script src="shared/auth.js"></script>
  <script>
  var listings = [], D = null, aspectMeta = [], catSearchTimer = null;

  var gbp = function(n){ return (n==null||isNaN(n)) ? "—" : "£"+Number(n).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2}); };
  var esc = function(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); };
  function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},3000); }

  var CONDITIONS = [
    ["NEW","New"],["NEW_OTHER","New (other)"],["LIKE_NEW","New without tags/box"],
    ["USED_EXCELLENT","Pre-owned — Excellent"],["USED_VERY_GOOD","Pre-owned — Very good"],
    ["USED_GOOD","Pre-owned — Good"],["USED_ACCEPTABLE","Pre-owned — Acceptable"],
    ["PRE_OWNED_EXCELLENT","Pre-owned — Excellent (apparel)"],["PRE_OWNED_FAIR","Pre-owned — Fair (apparel)"],
    ["FOR_PARTS_OR_NOT_WORKING","For parts / not working"]
  ];
  function condLabel(c){ for(var i=0;i<CONDITIONS.length;i++) if(CONDITIONS[i][0]===c) return CONDITIONS[i][1]; return c||"—"; }

  /* ── LIST ──────────────────────────────────────────────────────────────── */
  async function loadListings(){
    var v = document.getElementById("listView");
    try{
      var res = await Auth.fetch("/ebay/listings");
      listings = await res.json();
      if(!Array.isArray(listings) || !listings.length){
        v.innerHTML = '<div class="empty"><div class="big">No live listings</div><div>Anything you post from “List an item” will appear here.</div></div>';
        return;
      }
      v.innerHTML = listings.map(function(l,i){
        return '<div class="listrow" onclick="openEdit('+i+')">'
          + '<div class="lt"><b>'+esc(l.title)+'</b>'
          + '<span class="sku">'+esc(l.sku||"")+'</span></div>'
          + '<span class="badge">'+esc(condLabel(l.condition))+'</span>'
          + '<span class="price">'+gbp(l.price)+'</span>'
          + '<button class="btn" onclick="event.stopPropagation();openEdit('+i+')">Revise</button>'
          + '</div>';
      }).join("");
    }catch(e){
      v.innerHTML = '<div class="empty"><div class="big">Couldn\'t load listings</div><div>'+esc(e.message)+'</div></div>';
    }
  }

  /* ── EDIT ──────────────────────────────────────────────────────────────── */
  window.openEdit = async function(i){
    var l = listings[i];
    document.getElementById("listView").classList.add("hidden");
    var ev = document.getElementById("editView");
    ev.classList.remove("hidden");
    document.getElementById("editBody").innerHTML = '<div class="empty"><div class="big"><span class="spin"></span></div><div>Loading listing details…</div></div>';
    document.getElementById("pageTitle").textContent = "Revise listing";
    document.getElementById("pageLede").textContent = "Change anything below — title, price, condition, category, item specifics or photos — then save to update the live listing.";
    window.scrollTo({top:0,behavior:"smooth"});
    try{
      var res = await Auth.fetch("/ebay/listings/"+encodeURIComponent(l.sku));
      D = await res.json();
      if(!D.ok) throw new Error(D.error||"Could not load listing");
      aspectMeta = D.aspectMeta||[];
      renderEdit();
    }catch(e){
      document.getElementById("editBody").innerHTML = '<div class="warnbox">Couldn\'t load this listing: '+esc(e.message)+'</div>';
    }
  };

  function renderEdit(){
    var h = '';
    h += '<h2 style="font-size:19px;font-weight:600;margin:6px 0 2px">'+esc(D.title)+'</h2>';
    h += '<div class="sku">'+esc(D.sku)+(D.listingId?' · listing '+esc(D.listingId):'')+' · '+esc(D.status||'')+'</div>';

    h += '<div class="sect"><h3>Listing details</h3></div>';
    h += '<div class="grid two">'
      +  '<div><label class="fld" for="f-title">Title <span id="tc" class="sku"></span></label>'
      +  '<input id="f-title" maxlength="80" value="'+esc(D.title).replace(/"/g,"&quot;")+'"></div>'
      +  '<div><label class="fld" for="f-price">Price (£)</label>'
      +  '<input id="f-price" type="number" step="0.50" min="0" value="'+(D.price!=null?D.price:"")+'"></div>'
      +  '</div>';
    h += '<div class="grid two">'
      +  '<div><label class="fld" for="f-cond">Condition</label><select id="f-cond">'
      +  CONDITIONS.map(function(c){ return '<option value="'+c[0]+'"'+(c[0]===D.condition?' selected':'')+'>'+esc(c[1])+'</option>'; }).join('')
      +  '</select></div>'
      +  '<div><label class="fld" for="f-qty">Quantity</label>'
      +  '<input id="f-qty" type="number" min="1" step="1" value="'+(D.quantity||1)+'"></div>'
      +  '</div>';
    h += '<div class="grid"><div><label class="fld" for="f-desc">Description</label>'
      +  '<textarea id="f-desc">'+esc(stripHtml(D.description))+'</textarea></div></div>';

    // Category
    h += '<div class="sect"><h3>Category</h3>'
      +  '<p class="hint">Changing the category changes which item specifics eBay requires — they\'ll reload below.</p></div>';
    h += '<div class="catbox">'
      +  '<div class="catcur">Current category ID: <b id="curCat">'+esc(D.categoryId||"—")+'</b></div>'
      +  '<input id="catSearch" placeholder="Search for a different category, e.g. men\'s shirts">'
      +  '<div id="catResults"></div></div>';

    // Aspects
    h += '<div class="sect"><h3>Item specifics</h3>'
      +  '<p class="hint">eBay requires the starred ones for this category. These drive search results, so accurate values matter.</p></div>';
    h += '<div id="aspectFields">'+renderAspects()+'</div>';

    // Photos
    h += '<div class="sect"><h3>Photos</h3>'
      +  '<p class="hint">Remove any you don\'t want. The first photo is the main image buyers see.</p></div>';
    h += '<div id="photoWrap">'+renderPhotos()+'</div>';

    h += '<div class="rowactions">'
      +  '<button class="btn primary" id="saveBtn">Save changes</button>'
      +  '<button class="btn" id="soldBtn">Mark as sold</button>'
      +  '<button class="btn" id="endBtn" style="color:var(--bad)">End listing</button>'
      +  (D.listingId?'<a class="btn ghost" target="_blank" href="https://www.ebay.co.uk/itm/'+esc(D.listingId)+'">View on eBay ↗</a>':'')
      +  '</div>';
    h += '<div id="saveStatus" style="margin-top:12px"></div>';

    document.getElementById("editBody").innerHTML = h;

    // wiring
    var ti = document.getElementById("f-title");
    var updateCount = function(){ document.getElementById("tc").textContent = ti.value.length+"/80"; };
    ti.addEventListener("input", updateCount); updateCount();
    document.getElementById("saveBtn").addEventListener("click", saveChanges);
    document.getElementById("soldBtn").addEventListener("click", markSold);
    document.getElementById("endBtn").addEventListener("click", endListing);
    document.getElementById("catSearch").addEventListener("input", onCatSearch);
  }

  function stripHtml(s){ var d=document.createElement("div"); d.innerHTML=String(s||""); return (d.textContent||"").trim(); }

  function renderAspects(){
    if(!aspectMeta.length) return '<p class="hint">No item specifics available for this category.</p>';
    var cur = D.aspects||{};
    var sorted = aspectMeta.slice().sort(function(a,b){ return (b.required?1:0)-(a.required?1:0); });
    return sorted.map(function(a,idx){
      var val = cur[a.name] ? (Array.isArray(cur[a.name])?cur[a.name][0]:cur[a.name]) : "";
      var id = "asp_"+idx;
      var f = '<div class="aspect"><label class="fld" for="'+id+'">'+esc(a.name)+(a.required?'<span class="req">*</span>':'')+'</label>';
      if(a.mode==="SELECTION_ONLY" && a.values && a.values.length){
        f += '<select id="'+id+'" data-aspect="'+esc(a.name)+'"><option value="">— not set —</option>'
          +  a.values.map(function(v){ return '<option value="'+esc(v).replace(/"/g,"&quot;")+'"'+(String(v)===String(val)?' selected':'')+'>'+esc(v)+'</option>'; }).join('')
          +  '</select>';
      } else {
        f += '<input id="'+id+'" data-aspect="'+esc(a.name)+'" value="'+esc(val).replace(/"/g,"&quot;")+'">';
      }
      return f + '</div>';
    }).join('');
  }

  function renderPhotos(){
    var urls = D.imageUrls||[];
    if(!urls.length) return '<p class="hint">No photos on this listing.</p>';
    return '<div class="thumbs">'+urls.map(function(u,i){
      return '<div class="thumb"><img src="'+esc(u)+'" alt=""><button class="del" onclick="removePhoto('+i+')" title="Remove">×</button></div>';
    }).join('')+'</div>';
  }

  window.removePhoto = function(i){
    D.imageUrls.splice(i,1);
    document.getElementById("photoWrap").innerHTML = renderPhotos();
  };

  /* ── CATEGORY SEARCH ───────────────────────────────────────────────────── */
  function onCatSearch(e){
    clearTimeout(catSearchTimer);
    var q = e.target.value.trim();
    var box = document.getElementById("catResults");
    if(q.length < 3){ box.innerHTML=""; return; }
    catSearchTimer = setTimeout(async function(){
      box.innerHTML = '<div class="catresult"><span class="spin"></span> Searching…</div>';
      try{
        var res = await Auth.fetch("/ebay/category-search?q="+encodeURIComponent(q));
        var data = await res.json();
        var sug = data.suggestions||[];
        if(!sug.length){ box.innerHTML='<div class="catresult">No matches.</div>'; return; }
        box.innerHTML = sug.map(function(sg){
          return '<div class="catresult" onclick="pickCategory(\''+sg.categoryId+'\')">'
            + '<b>'+esc(sg.categoryName)+'</b> <span class="sku">'+sg.categoryId+'</span><br>'
            + '<span class="hint" style="margin:0">'+esc(sg.path)+'</span></div>';
        }).join('');
      }catch(err){ box.innerHTML='<div class="catresult">Search failed.</div>'; }
    }, 450);
  }

  window.pickCategory = async function(catId){
    D.categoryId = catId;
    document.getElementById("curCat").textContent = catId;
    document.getElementById("catResults").innerHTML = "";
    document.getElementById("catSearch").value = "";
    var af = document.getElementById("aspectFields");
    af.innerHTML = '<p class="hint"><span class="spin"></span> Loading item specifics for the new category…</p>';
    try{
      var res = await Auth.fetch("/ebay/aspects/"+encodeURIComponent(catId));
      var data = await res.json();
      aspectMeta = data.aspectMeta||[];
      af.innerHTML = renderAspects();
      toast("Category updated — check the item specifics");
    }catch(e){ af.innerHTML = '<div class="warnbox">Couldn\'t load specifics: '+esc(e.message)+'</div>'; }
  };

  /* ── SAVE / END / SOLD ─────────────────────────────────────────────────── */
  function collectAspects(){
    var out = {};
    document.querySelectorAll("[data-aspect]").forEach(function(el){
      var v = String(el.value||"").trim();
      if(v) out[el.getAttribute("data-aspect")] = [v];
    });
    return out;
  }

  async function saveChanges(){
    var st = document.getElementById("saveStatus");
    var btn = document.getElementById("saveBtn");
    var aspects = collectAspects();
    var missing = aspectMeta.filter(function(a){ return a.required && !aspects[a.name]; }).map(function(a){ return a.name; });
    if(missing.length && !confirm("These required item specifics are empty:\n\n"+missing.join(", ")+"\n\neBay may reject the update. Save anyway?")) return;

    btn.disabled = true;
    st.innerHTML = '<div class="hint"><span class="spin"></span> Saving to eBay…</div>';
    try{
      var res = await Auth.fetch("/ebay/listings/"+encodeURIComponent(D.sku), {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          offerId:     D.offerId,
          title:       document.getElementById("f-title").value.trim(),
          price:       parseFloat(document.getElementById("f-price").value),
          condition:   document.getElementById("f-cond").value,
          quantity:    parseInt(document.getElementById("f-qty").value,10)||1,
          description: document.getElementById("f-desc").value,
          categoryId:  D.categoryId,
          aspects:     aspects,
          imageUrls:   D.imageUrls||[],
        })
      });
      var data = await res.json();
      if(!data.ok) throw new Error(data.error||"Update failed");
      var note = "";
      if(data.conditionChanged) note += ' Condition adjusted to <b>'+esc(condLabel(data.condition))+'</b> for this category.';
      if(data.missingAspects && data.missingAspects.length) note += ' Missing specifics: '+esc(data.missingAspects.join(", "))+'.';
      st.innerHTML = '<div class="ok" style="background:color-mix(in srgb,var(--good) 12%,transparent);border:1px solid color-mix(in srgb,var(--good) 35%,transparent);color:var(--good);padding:11px 14px;border-radius:8px;font-size:13px">✓ Listing updated.'+note+'</div>';
      toast("Saved to eBay");
      loadListings();
    }catch(e){
      st.innerHTML = '<div class="warnbox">Save failed: '+esc(e.message)+'</div>';
    }
    btn.disabled = false;
  }

  async function markSold(){
    if(!confirm("Mark this item as sold? It will be removed from eBay and logged.")) return;
    try{
      var res = await Auth.fetch("/ebay/listings/"+encodeURIComponent(D.sku)+"/sold", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ title:D.title, soldPrice:parseFloat(document.getElementById("f-price").value) })
      });
      var d = await res.json();
      if(!d.ok) throw new Error(d.error||"Failed");
      toast("Marked as sold"); backToList(); loadListings();
    }catch(e){ toast("Couldn't mark as sold: "+e.message); }
  }

  async function endListing(){
    if(!confirm("End this listing on eBay? This can't be undone.")) return;
    try{
      var res = await Auth.fetch("/ebay/listings/"+encodeURIComponent(D.sku), { method:"DELETE" });
      var d = await res.json();
      if(!d.ok) throw new Error(d.error||"Failed");
      toast("Listing ended"); backToList(); loadListings();
    }catch(e){ toast("Couldn't end listing: "+e.message); }
  }

  function backToList(){
    document.getElementById("editView").classList.add("hidden");
    document.getElementById("listView").classList.remove("hidden");
    document.getElementById("pageTitle").textContent = "Live listings";
    document.getElementById("pageLede").textContent = "Items listed through this tool. Because they were created via the Inventory API they can't be edited in Seller Hub — revise them here.";
  }
  document.getElementById("backToList").addEventListener("click", function(e){ e.preventDefault(); backToList(); });

  Auth.protect({ onReady: function(){ loadListings(); } });
  </script>
</body>
</html>
